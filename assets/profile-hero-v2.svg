<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Meiske Sahertian — GitHub Profile</title>
  <desc>Professional GitHub profile banner for Meiske Sahertian</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#09090b"/>
      <stop offset="1" stop-color="#0c0c0e"/>
    </linearGradient>
    <clipPath id="circle-clip">
      <circle cx="980" cy="210" r="140"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="url(#bg)"/>

  <!-- Subtle top hairline -->
  <line x1="100" y1="80" x2="1100" y2="80" stroke="#1c1c1e" stroke-width="1"/>

  <!-- Small label -->
  <text x="100" y="130"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="11" font-weight="600" fill="#52525b" letter-spacing="4">
    GITHUB PROFILE
  </text>

  <!-- Name -->
  <text x="100" y="200"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="64" font-weight="700" fill="#fafafa" letter-spacing="-1.5">
    Meiske Sahertian
  </text>

  <!-- Accent line -->
  <rect x="100" y="228" width="40" height="2" rx="1" fill="#a1a1aa"/>

  <!-- Role / Tagline -->
  <text x="100" y="270"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="18" font-weight="400" fill="#a1a1aa">
    Informatics · AI Systems · Software Engineering
  </text>

  <!-- Short bio -->
  <text x="100" y="305"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="15" font-weight="400" fill="#71717a">
    Building practical systems, clean interfaces, and experiments with real-world impact.
  </text>

  <!-- Right-side geometric accent: concentric circles (very subtle) -->
  <g opacity="0.35">
    <circle cx="980" cy="210" r="140" stroke="#27272a" stroke-width="1" fill="none"/>
    <circle cx="980" cy="210" r="110" stroke="#27272a" stroke-width="1" fill="none"/>
    <circle cx="980" cy="210" r="80" stroke="#27272a" stroke-width="1" fill="none"/>
    <circle cx="980" cy="210" r="50" stroke="#27272a" stroke-width="1" fill="none"/>
  </g>

  <!-- Right-side dot grid inside outer circle (ultra subtle) -->
  <g clip-path="url(#circle-clip)" opacity="0.15">
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#52525b"/>
    </pattern>
    <rect x="820" y="50" width="320" height="320" fill="url(#dots)"/>
  </g>

  <!-- Bottom hairline -->
  <line x1="100" y1="360" x2="1100" y2="360" stroke="#1c1c1e" stroke-width="1"/>

  <!-- Bottom-right institution -->
  <text x="1100" y="390" text-anchor="end"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="11" font-weight="600" fill="#3f3f46" letter-spacing="3">
    BATAM STATE POLYTECHNIC
  </text>
</svg>