<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Meiske Sahertian profile hero</title>
  <desc id="desc">A professional GitHub profile banner with an isometric technology console and text about artificial intelligence and software engineering.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111F"/>
      <stop offset="0.46" stop-color="#0E1B2D"/>
      <stop offset="1" stop-color="#172027"/>
    </linearGradient>
    <linearGradient id="panel" x1="730" y1="62" x2="1118" y2="343" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4AE3C1"/>
      <stop offset="0.5" stop-color="#58A6FF"/>
      <stop offset="1" stop-color="#FFB454"/>
    </linearGradient>
    <linearGradient id="glass" x1="654" y1="98" x2="1110" y2="334" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#F7FBFF" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#000000" flood-opacity="0.36"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.29 0 0 0 0 0.89 0 0 0 0 0.76 0 0 0 0.55 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" stroke="#8FB7D8" stroke-opacity="0.09" stroke-width="1"/>
    </pattern>
    <style>
      .float { animation: float 5.8s ease-in-out infinite; transform-origin: 880px 214px; }
      .dash { stroke-dasharray: 7 14; animation: dash 6s linear infinite; }
      .pulse { animation: pulse 2.8s ease-in-out infinite; }
      .blink { animation: blink 2.2s ease-in-out infinite; }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      @keyframes dash {
        to { stroke-dashoffset: -84; }
      }
      @keyframes pulse {
        0%, 100% { opacity: .52; }
        50% { opacity: 1; }
      }
      @keyframes blink {
        0%, 46%, 100% { opacity: 1; }
        50%, 64% { opacity: .28; }
      }
      @media (prefers-reduced-motion: reduce) {
        .float, .dash, .pulse, .blink { animation: none; }
      }
    </style>
  </defs>

  <rect width="1200" height="420" rx="30" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="30" fill="url(#grid)"/>
  <path d="M0 337C166 298 292 352 435 322C582 291 661 183 798 172C952 159 1058 260 1200 221V420H0V337Z" fill="#58A6FF" fill-opacity="0.07"/>
  <path d="M70 89H404" stroke="#F7FBFF" stroke-opacity="0.10"/>
  <path d="M70 332H540" stroke="#F7FBFF" stroke-opacity="0.10"/>
  <path d="M71 118C146 77 239 73 332 109C425 145 478 130 542 84" stroke="#4AE3C1" stroke-opacity="0.22" stroke-width="2"/>

  <g transform="translate(72 70)">
    <rect x="0" y="0" width="114" height="30" rx="15" fill="#4AE3C1" fill-opacity="0.13" stroke="#4AE3C1" stroke-opacity="0.42"/>
    <circle cx="20" cy="15" r="4" fill="#4AE3C1"/>
    <text x="34" y="20" fill="#C9D7E5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" letter-spacing="1.4">PROFILE</text>
    <text x="0" y="82" fill="#F7FBFF" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700">Meiske</text>
    <text x="0" y="138" fill="#F7FBFF" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700">Sahertian</text>
    <text x="0" y="181" fill="#9DB1C7" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">AI / Software Engineering / Product-minded systems</text>
    <text x="0" y="223" fill="#E6EDF3" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="21">Informatics student building practical systems,</text>
    <text x="0" y="255" fill="#E6EDF3" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="21">clean interfaces, and experiments with real-world impact.</text>
    <g transform="translate(0 294)">
      <rect width="132" height="36" rx="18" fill="#F7FBFF" fill-opacity="0.08" stroke="#F7FBFF" stroke-opacity="0.13"/>
      <text x="18" y="24" fill="#F7FBFF" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">AI Systems</text>
      <rect x="148" width="154" height="36" rx="18" fill="#F7FBFF" fill-opacity="0.08" stroke="#F7FBFF" stroke-opacity="0.13"/>
      <text x="166" y="24" fill="#F7FBFF" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">Web Products</text>
      <rect x="318" width="176" height="36" rx="18" fill="#F7FBFF" fill-opacity="0.08" stroke="#F7FBFF" stroke-opacity="0.13"/>
      <text x="336" y="24" fill="#F7FBFF" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">Scalable Ideas</text>
    </g>
  </g>

  <g class="float" filter="url(#softShadow)">
    <path d="M756 246L897 166L1046 246L904 330L756 246Z" fill="#06121F" stroke="url(#panel)" stroke-width="2"/>
    <path d="M756 246L904 330V364L756 281V246Z" fill="#0B1828" stroke="#58A6FF" stroke-opacity="0.38"/>
    <path d="M1046 246L904 330V364L1046 280V246Z" fill="#132233" stroke="#FFB454" stroke-opacity="0.36"/>
    <path d="M779 246L898 179L1023 246L903 316L779 246Z" fill="url(#glass)" stroke="#F7FBFF" stroke-opacity="0.18"/>

    <path d="M828 247L897 208L971 247L902 287L828 247Z" fill="#102237" stroke="#4AE3C1" stroke-opacity="0.75" stroke-width="2"/>
    <path d="M869 247L898 231L930 247L901 264L869 247Z" fill="#4AE3C1" fill-opacity="0.13" stroke="#4AE3C1" stroke-opacity="0.8"/>
    <path d="M820 223L898 179L982 224" stroke="#58A6FF" stroke-opacity="0.66" stroke-width="2" class="dash"/>
    <path d="M803 268L903 326L1010 263" stroke="#FFB454" stroke-opacity="0.55" stroke-width="2" class="dash"/>

    <circle cx="898" cy="208" r="7" fill="#4AE3C1" filter="url(#glow)" class="pulse"/>
    <circle cx="828" cy="247" r="6" fill="#58A6FF" class="pulse"/>
    <circle cx="971" cy="247" r="6" fill="#FFB454" class="pulse"/>
    <circle cx="902" cy="287" r="6" fill="#4AE3C1" class="pulse"/>

    <g transform="translate(1000 106)">
      <path d="M0 73L69 34L138 73L69 113L0 73Z" fill="#07111F" stroke="#58A6FF" stroke-opacity="0.44"/>
      <path d="M69 34V0L138 39V73L69 34Z" fill="#1B3650" stroke="#58A6FF" stroke-opacity="0.44"/>
      <path d="M69 34V0L0 39V73L69 34Z" fill="#102235" stroke="#4AE3C1" stroke-opacity="0.36"/>
      <text x="42" y="77" fill="#F7FBFF" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">CODE</text>
    </g>

    <g transform="translate(704 116)">
      <rect width="160" height="92" rx="18" fill="#07111F" stroke="#F7FBFF" stroke-opacity="0.16"/>
      <rect x="18" y="18" width="56" height="8" rx="4" fill="#4AE3C1" fill-opacity="0.9"/>
      <rect x="18" y="40" width="116" height="8" rx="4" fill="#58A6FF" fill-opacity="0.56"/>
      <rect x="18" y="62" width="86" height="8" rx="4" fill="#FFB454" fill-opacity="0.72"/>
      <circle cx="128" cy="22" r="5" fill="#4AE3C1" class="blink"/>
    </g>

    <path d="M845 191C881 151 927 144 968 171" stroke="#4AE3C1" stroke-opacity="0.36" stroke-width="2"/>
    <path d="M964 171C1014 202 1026 231 1002 267" stroke="#58A6FF" stroke-opacity="0.32" stroke-width="2"/>
  </g>

  <g opacity="0.5">
    <path d="M641 82L658 99L641 116L624 99L641 82Z" fill="#FFB454"/>
    <path d="M1120 330L1133 343L1120 356L1107 343L1120 330Z" fill="#4AE3C1"/>
    <path d="M587 278L599 290L587 302L575 290L587 278Z" fill="#58A6FF"/>
  </g>
</svg>
