<svg width="1200" height="330" viewBox="0 0 1200 330" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Profile snapshot</title>
  <desc id="desc">A GitHub profile snapshot card showing Meiske Sahertian's focus areas, stack direction, and building rhythm.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09090B"/>
      <stop offset="1" stop-color="#121216"/>
    </linearGradient>
    <linearGradient id="accent" x1="80" y1="56" x2="1120" y2="274" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4F4F5"/>
      <stop offset="0.52" stop-color="#A1A1AA"/>
      <stop offset="1" stop-color="#52525B"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="330" rx="24" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="328" rx="23" stroke="#27272A"/>
  <path d="M72 74H1128" stroke="#27272A"/>
  <path d="M72 257H1128" stroke="#27272A"/>

  <text x="72" y="48" fill="#71717A" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="3">PROFILE SNAPSHOT</text>
  <text x="72" y="114" fill="#FAFAFA" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="34" font-weight="700">Learning in public. Building with intent.</text>
  <text x="72" y="151" fill="#A1A1AA" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="17">A practical mix of AI systems, software engineering, and clean product interfaces.</text>

  <g filter="url(#shadow)">
    <rect x="72" y="188" width="310" height="86" rx="18" fill="#111114" stroke="#27272A"/>
    <text x="96" y="222" fill="#FAFAFA" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" font-weight="700">Current direction</text>
    <text x="96" y="250" fill="#A1A1AA" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14">AI-assisted products and reliable systems</text>

    <rect x="445" y="188" width="310" height="86" rx="18" fill="#111114" stroke="#27272A"/>
    <text x="469" y="222" fill="#FAFAFA" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" font-weight="700">Stack direction</text>
    <text x="469" y="250" fill="#A1A1AA" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14">Python, TypeScript, React, FastAPI, Supabase</text>

    <rect x="818" y="188" width="310" height="86" rx="18" fill="#111114" stroke="#27272A"/>
    <text x="842" y="222" fill="#FAFAFA" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" font-weight="700">Building rhythm</text>
    <text x="842" y="250" fill="#A1A1AA" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14">Think clearly, ship carefully, refine often</text>
  </g>

  <g transform="translate(842 96)">
    <path d="M0 34H232" stroke="url(#accent)" stroke-width="2"/>
    <circle cx="0" cy="34" r="5" fill="#F4F4F5"/>
    <circle cx="78" cy="34" r="5" fill="#D4D4D8"/>
    <circle cx="155" cy="34" r="5" fill="#A1A1AA"/>
    <circle cx="232" cy="34" r="5" fill="#71717A"/>
    <text x="-13" y="66" fill="#71717A" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="700">IDEA</text>
    <text x="57" y="66" fill="#71717A" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="700">BUILD</text>
    <text x="132" y="66" fill="#71717A" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="700">LEARN</text>
    <text x="207" y="66" fill="#71717A" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="700">SHIP</text>
  </g>
</svg>
